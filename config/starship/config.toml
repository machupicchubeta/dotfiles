format = """
$directory\
$jobs\
$shell\
$shlvl\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$time\
$line_break\
$character\
"""

add_newline = true

continuation_prompt = '[❯](bright-black) '

[character]
disabled = false
success_symbol = "[λ](green)"
error_symbol = "[∅](red)"

[directory]
disabled = false
truncation_length = 8
truncation_symbol = "…/"
style = "cyan"

[git_branch]
disabled = false
symbol = "🌱 "
style = "purple"

[git_commit]
disabled = false
format = '[\[ $hash$tag \]]($style) '
style = "dimmed purple"
only_detached = false

[git_state]
disabled = false
format = '[\[ $state( $progress_current of $progress_total) \]]($style) '
style = "dimmed purple"
rebase = "🏕  REBASING"
merge = "🦓  MERGING"
revert = "🔙  REVERTING"
cherry_pick = "🍒  CHERRY-PICKING"
bisect = "🍪  BISECTING"
am = "✉️  AM"
am_or_rebase = "🏕 ✉️  AM/REBASE"

[git_metrics]
disabled = false
added_style = 'dimmed green'
deleted_style = 'dimmed red'

[git_status]
disabled = false
format = '([\[ $all_status$ahead_behind\]]($style) )'
style = "dimmed purple"
conflicted = "⚔️:$count "
ahead = "🏎 💨:$count "
behind = "🐢:$count "
diverged = "🔱 : 🏎️ 💨:$ahead_count / 🐢:$behind_count "
up_to_date = "🍀 "
untracked = "🛤️:$count "
stashed = "📦:$count "
modified = "📝:$count "
staged = "🗃️:$count "
renamed = "📛:$count "
deleted = "🗑 :$count "
typechanged = "🧬:$count "

[jobs]
disabled = false
format = '[$symbol(:$number)]($style) '
symbol = "⏳"
style = "dimmed white"

[line_break]
disabled = false

[shell]
disabled = false
style = 'dimmed white'

[shlvl]
disabled = false
format = "[$symbol:$shlvl]($style) "
symbol = "♻️"
style = "dimmed white"

[time]
disabled = false
time_format = "%F%T%.f%:z"
style = "dimmed white"
